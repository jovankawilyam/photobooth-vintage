<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Vintage Photobooth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="vintage">

<h1>Vintage Newspaper Photobooth</h1>

<div class="camera-wrapper">
  <video id="video" autoplay playsinline></video>
  <div id="countdown" class="countdown hidden"></div>
</div>

<div class="controls">
  <div class="timer">
    <label><input type="radio" name="timer" value="3" checked>3s</label>
    <label><input type="radio" name="timer" value="5">5s</label>
    <label><input type="radio" name="timer" value="10">10s</label>
  </div>

  <button id="takePhoto">Take Photo</button>

  <label class="upload-btn">
    Upload Foto
    <input type="file" id="uploadPhoto" accept="image/*" hidden>
  </label>
</div>

<canvas id="captureCanvas" hidden></canvas>

<script src="script.js"></script>
</body>
</html>
